<html xmlns:th="http://www.thymeleaf.org">
<body>
    <h2>Clases</h2>

    <a th:href="@{/}">🏠 Inicio</a>
    <a th:href="@{/clases/nueva}">➕ Nueva Clase</a>

    <div th:if="${success}" style="color: green;">
        <p th:text="${success}"></p>
    </div>

    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>

    <table border="1">
        <tr>
            <th>Nombre</th>
            <th>Maestro</th>
            <th>Acciones</th>
        </tr>

        <tr th:each="clase : ${clases}">
            <td th:text="${clase.nombre}"></td>
            <td th:text="${clase.maestro}"></td>
            <td>
                <a th:href="@{/clases/{id}(id=${clase.id})}">Ver</a>
                <a th:href="@{/clases/eliminar/{id}(id=${clase.id})}"
                   onclick="return confirm('¿Seguro que quieres eliminar esta clase?')">
                    Eliminar
                </a>
                <a th:href="@{/clases/editar/{id}(id=${clase.id})}">
                    Editar
                </a>
            </td>
        </tr>
    </table>
</body>
</html>
