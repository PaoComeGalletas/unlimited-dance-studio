<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Clase</title>
</head>
<body>

<h2>Crear / Editar Clase</h2>

<form th:action="@{/clases}" th:object="${clase}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required />
    <br><br>

    <label>Maestro:</label>
    <input type="text" th:field="*{maestro}" required />
    <br><br>

    <button type="submit">Guardar</button>
</form>

<br>
<a th:href="@{/clases}">⬅ Volver</a>

</body>
</html>
